  # Note: No aws_access_key_id or aws_secret_access_key needed!
  #       LiteLLM will automatically use the ECS Task IAM Role

# LiteLLM settings
litellm_settings:
  # Drop unsupported parameters
  drop_params: true

  # Set verbose logging (set to false in production)
  set_verbose: false

  # Request timeout
  request_timeout: 600

  # Enable streaming
  stream_timeout: 600

# General settings
general_settings:
  # Master key for authentication
  master_key: os.environ/LITELLM_MASTER_KEY

  # Database URL for tracking and virtual keys
  database_url: os.environ/DATABASE_URL

  # Store model in database
  store_model_in_db: true

  # Enable fallbacks
  enable_fallbacks: true

